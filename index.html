<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Proyecciones App</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="theme-color" content="#d4af37">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000; --card: #111111; --gold: #d4af37; --gold-dark: #aa8c2c;
            --text: #ffffff; --text-dim: #a0a0a0; --border: #222222;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }
        
        /* Login */
        #login-wrap { height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: var(--card); border: 1px solid var(--border); padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; }
        
        /* Header & Dashboard */
        .header { padding: 40px 20px; text-align: center; background: linear-gradient(to bottom, #1a1505, #000); }
        .status-dot { width: 8px; height: 8px; background: #2ecc71; border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 10px #2ecc71; }
        .main-total { font-family: 'Playfair Display', serif; font-size: 3.5rem; color: var(--gold); margin: 10px 0; }
        
        /* Contenedores */
        .container { padding: 20px; max-width: 600px; margin: 0 auto; }
        .section-title { color: var(--gold); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
        
        /* Cards y Form */
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        input, select { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 10px; margin-bottom: 15px; font-size: 1rem; }
        button { width: 100%; background: var(--gold); color: #000; border: none; padding: 15px; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        button:active { transform: scale(0.98); background: var(--gold-dark); }
        
        .banco-item { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid var(--border); }
        .banco-nombre { font-weight: 500; }
        .banco-saldo { color: var(--gold); font-weight: 600; }
    </style>
</head>
<body>

<div id="login-wrap">
    <div class="login-card">
        <h2 style="color:var(--gold); margin-bottom:20px;">XURI Acceso</h2>
        <input type="email" id="l-email" placeholder="Email">
        <input type="password" id="l-pass" placeholder="Contraseña">
        <button onclick="doLogin()">ENTRAR</button>
    </div>
</div>

<div id="app" style="display:none;">
    <div class="header">
        <div><span class="status-dot"></span><span style="font-size:0.8rem; color:var(--text-dim);">SISTEMA CONECTADO</span></div>
        <div class="main-total" id="total-bancos">$0.00</div>
        <div style="color:var(--text-dim); font-size:0.8rem;">TOTAL EN CUENTAS</div>
    </div>

    <div class="container">
        <div class="section-title">Nuevo Registro</div>
        <div class="card">
            <input type="text" id="b-nombre" placeholder="Nombre (Ej: Pichincha)">
            <input type="number" id="b-saldo" placeholder="Saldo Inicial">
            <select id="b-tipo">
                <option value="Ahorros">Ahorros</option>
                <option value="Corriente">Corriente</option>
                <option value="Efectivo">Efectivo / Caja</option>
            </select>
            <button onclick="addBanco()">+ AGREGAR A MI FLUJO</button>
        </div>

        <div class="section-title">Mis Cuentas</div>
        <div id="lista-bancos"></div>
        
        <button onclick="doLogout()" style="background:transparent; color:var(--text-dim); margin-top:40px; border:1px solid var(--border);">Cerrar Sesión</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";
import { getFirestore, collection, addDoc, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAy0pcPg5nF1cQNlSBLG_5JJvgJij0aswM",
  authDomain: "presupuesto-45e0c.firebaseapp.com",
  projectId: "presupuesto-45e0c",
  storageBucket: "presupuesto-45e0c.firebasestorage.app",
  messagingSenderId: "647523607915",
  appId: "1:647523607915:web:d308b2c54885f224b2182e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let uid = null;
let bancosCache = [];

function expose(name, fn){ window[name] = fn; }

// --- SINCRONIZACIÓN EN TIEMPO REAL ---
function iniciarSincronizacion(){
  const q = query(collection(db, 'bancos'), where('uid', '==', uid));
  onSnapshot(q, (snap) => {
    bancosCache = snap.docs.map(doc => ({
      id: doc.id,
      ...doc.data(),
      // Nos aseguramos de leer saldoActual o saldo
      monto: parseFloat(doc.data().saldoActual || doc.data().saldo || 0)
    }));
    actualizarPantalla();
  });
}

function actualizarPantalla(){
  const total = bancosCache.reduce((acc, b) => acc + b.monto, 0);
  document.getElementById('total-bancos').textContent = `$${total.toLocaleString('en-US', {minimumFractionDigits: 2})}`;
  
  const lista = document.getElementById('lista-bancos');
  if(bancosCache.length === 0){
    lista.innerHTML = '<p style="text-align:center; color:var(--text-dim);">No hay cuentas activas.</p>';
    return;
  }
  
  lista.innerHTML = bancosCache.map(b => `
    <div class="banco-item">
        <span class="banco-nombre">${b.nombre}</span>
        <span class="banco-saldo">$${b.monto.toLocaleString('en-US', {minimumFractionDigits: 2})}</span>
    </div>
  `).join('');
}

// --- ACCIONES ---
expose('addBanco', async () => {
    const nombre = document.getElementById('b-nombre').value.trim();
    const saldo = parseFloat(document.getElementById('b-saldo').value) || 0;
    const tipo = document.getElementById('b-tipo').value;

    if(!nombre) { alert("Ingresa el nombre del banco"); return; }

    try {
        await addDoc(collection(db, 'bancos'), {
            uid: uid,
            nombre: nombre,
            saldo: saldo,
            saldoActual: saldo,
            tipo: tipo,
            fecha: new Date().toISOString()
        });
        document.getElementById('b-nombre').value = '';
        document.getElementById('b-saldo').value = '';
        console.log("Guardado correctamente");
    } catch(e) {
        alert("Error al guardar: " + e.message);
    }
});

// --- SESIÓN ---
onAuthStateChanged(auth, user => {
    if(user){
        uid = user.uid;
        document.getElementById('login-wrap').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        iniciarSincronizacion();
    } else {
        document.getElementById('login-wrap').style.display = 'flex';
        document.getElementById('app').style.display = 'none';
    }
});

expose('doLogin', () => {
    const email = document.getElementById('l-email').value;
    const pass = document.getElementById('l-pass').value;
    signInWithEmailAndPassword(auth, email, pass).catch(e => alert("Error: " + e.message));
});

expose('doLogout', () => signOut(auth));

</script>
</body>
</html>
